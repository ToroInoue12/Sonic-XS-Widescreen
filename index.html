<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Drive - Google Drive</title>
    <style>
        /* stop looking at my easter eggs */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background-color: #000; 
            display: flex;          
            justify-content: center; 
            align-items: center;     
            overflow: hidden; 
        }
        
        #ruffle { 
            width: 95vw;  /* Slightly less than full width to keep it clean */
            height: 95vh; /* Slightly less than full height */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="ruffle"></div>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            
            // Ensures the player stays centered and scales correctly
            player.style.width = "100%";
            player.style.height = "100%";
            
            player.load("Sonic_Xs.swf");
        });
    </script>
</body>
</html>
